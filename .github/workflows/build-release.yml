name: Build and Release

# 定义本Action需要对仓库中的文件进行写操作的权限。
permissions:
  contents: write

# 推送的tag中以v开头则执行此action
on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      # 设置node版本
      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 设置pnpm版本
      - name: "Set up pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      # 安装依赖
      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile
      # 执行构建命令
      - name: "Build"
        run: pnpm run build-rollup:prod
      # 将dist目录打成zip包
      - name: Zip Dist
        run: zip -r js-screen-shot-dist.zip dist
      # 使用 GitHub 默认 token 创建 Release 并上传产物
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            js-screen-shot-dist.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}" \
            --verify-tag
